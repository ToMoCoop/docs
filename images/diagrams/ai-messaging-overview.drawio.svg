<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 620" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 z" fill="#1D4763"/>
    </marker>
    <marker id="arrowG" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 z" fill="#248814"/>
    </marker>
    <marker id="arrowP" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 z" fill="#8C4FFF"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1080" height="620" fill="#FFFFFF"/>
  <text x="540" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#1D4763">ClarusWMS AI Messaging — High-Level Architecture</text>

  <!-- Chat platforms group -->
  <rect x="24" y="96" width="170" height="200" rx="8" fill="#F7F8FA" stroke="#8896A6" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="34" y="116" font-size="12" font-weight="600" fill="#5A6C86">Chat Platforms</text>
  <rect x="44" y="132" width="130" height="62" rx="7" fill="#FFFFFF" stroke="#4A154B" stroke-width="2"/>
  <text x="109" y="158" text-anchor="middle" font-size="13" font-weight="600" fill="#1D3A52">Slack</text>
  <text x="109" y="176" text-anchor="middle" font-size="11" fill="#5A6C86">events + Web API</text>
  <rect x="44" y="210" width="130" height="62" rx="7" fill="#FFFFFF" stroke="#1FAE54" stroke-width="2"/>
  <text x="109" y="236" text-anchor="middle" font-size="13" font-weight="600" fill="#1D3A52">WhatsApp</text>
  <text x="109" y="254" text-anchor="middle" font-size="11" fill="#5A6C86">Meta Cloud API</text>

  <!-- AI Messaging account -->
  <rect x="228" y="72" width="600" height="478" rx="10" fill="none" stroke="#CD2264" stroke-width="1.5" stroke-dasharray="7 4"/>
  <text x="240" y="90" font-size="12" font-weight="700" fill="#CD2264">AI Messaging AWS account (per environment)</text>

  <!-- Receiver -->
  <rect x="258" y="140" width="138" height="62" rx="7" fill="#FFFFFF" stroke="#ED7100" stroke-width="2"/>
  <text x="327" y="166" text-anchor="middle" font-size="13" font-weight="600" fill="#1D3A52">Receiver λ</text>
  <text x="327" y="184" text-anchor="middle" font-size="11" fill="#5A6C86">verify + queue</text>
  <!-- SQS -->
  <rect x="440" y="140" width="120" height="62" rx="7" fill="#FFFFFF" stroke="#E7157B" stroke-width="2"/>
  <text x="500" y="166" text-anchor="middle" font-size="13" font-weight="600" fill="#1D3A52">SQS queue</text>
  <text x="500" y="184" text-anchor="middle" font-size="11" fill="#5A6C86">+ DLQ (2 retries)</text>
  <!-- Processor -->
  <rect x="606" y="140" width="150" height="62" rx="7" fill="#FFFFFF" stroke="#ED7100" stroke-width="2"/>
  <text x="681" y="166" text-anchor="middle" font-size="13" font-weight="600" fill="#1D3A52">Processor λ</text>
  <text x="681" y="184" text-anchor="middle" font-size="11" fill="#5A6C86">invoke agent + reply</text>
  <!-- Cognito -->
  <rect x="606" y="232" width="150" height="52" rx="7" fill="#FFFFFF" stroke="#DD344C" stroke-width="2"/>
  <text x="681" y="255" text-anchor="middle" font-size="13" font-weight="600" fill="#1D3A52">Cognito</text>
  <text x="681" y="272" text-anchor="middle" font-size="11" fill="#5A6C86">service JWT</text>
  <!-- Alerts -->
  <rect x="606" y="452" width="150" height="58" rx="7" fill="#FFFFFF" stroke="#ED7100" stroke-width="2"/>
  <text x="681" y="477" text-anchor="middle" font-size="13" font-weight="600" fill="#1D3A52">Alerts λ</text>
  <text x="681" y="495" text-anchor="middle" font-size="11" fill="#5A6C86">notify (HMAC)</text>

  <!-- Subgraph VPC -->
  <rect x="258" y="312" width="320" height="150" rx="8" fill="#F2F8F0" stroke="#248814" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="268" y="330" font-size="11" font-weight="600" fill="#248814">AI Messaging subgraph</text>
  <rect x="276" y="350" width="140" height="60" rx="7" fill="#FFFFFF" stroke="#ED7100" stroke-width="2"/>
  <text x="346" y="376" text-anchor="middle" font-size="12.5" font-weight="600" fill="#1D3A52">PostGraphile</text>
  <text x="346" y="394" text-anchor="middle" font-size="11" fill="#5A6C86">ECS Fargate :5000</text>
  <rect x="430" y="350" width="130" height="60" rx="7" fill="#FFFFFF" stroke="#3334B9" stroke-width="2"/>
  <text x="495" y="372" text-anchor="middle" font-size="12.5" font-weight="600" fill="#1D3A52">RDS Postgres</text>
  <text x="495" y="389" text-anchor="middle" font-size="10.5" fill="#5A6C86">ai_messaging schema</text>
  <text x="495" y="402" text-anchor="middle" font-size="10.5" fill="#5A6C86">(Row-Level Security)</text>

  <!-- Agents-runtime account -->
  <rect x="872" y="110" width="192" height="110" rx="10" fill="none" stroke="#CD2264" stroke-width="1.5" stroke-dasharray="7 4"/>
  <text x="880" y="128" font-size="11" font-weight="700" fill="#CD2264">Agents-runtime account</text>
  <rect x="888" y="142" width="160" height="62" rx="7" fill="#FFFFFF" stroke="#01A88D" stroke-width="2"/>
  <text x="968" y="168" text-anchor="middle" font-size="13" font-weight="600" fill="#1D3A52">Agent Runtime</text>
  <text x="968" y="186" text-anchor="middle" font-size="11" fill="#5A6C86">Bedrock AgentCore</text>

  <!-- Gateway account -->
  <rect x="872" y="320" width="192" height="110" rx="10" fill="none" stroke="#CD2264" stroke-width="1.5" stroke-dasharray="7 4"/>
  <text x="880" y="338" font-size="11" font-weight="700" fill="#CD2264">Gateway account</text>
  <rect x="888" y="354" width="160" height="60" rx="7" fill="#FFFFFF" stroke="#8C4FFF" stroke-width="2"/>
  <text x="968" y="380" text-anchor="middle" font-size="13" font-weight="600" fill="#1D3A52">Apollo Router</text>
  <text x="968" y="398" text-anchor="middle" font-size="11" fill="#5A6C86">federated GraphQL</text>

  <!-- Arrows -->
  <!-- chat -> receiver -->
  <path d="M194,196 L256,172" fill="none" stroke="#1D4763" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="218" y="176" text-anchor="middle" font-size="10.5" fill="#1D4763">webhook</text>
  <!-- receiver -> sqs -->
  <path d="M396,171 L438,171" fill="none" stroke="#1D4763" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="417" y="163" text-anchor="middle" font-size="10.5" fill="#1D4763">enqueue</text>
  <!-- sqs -> processor -->
  <path d="M560,171 L604,171" fill="none" stroke="#1D4763" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="582" y="163" text-anchor="middle" font-size="10.5" fill="#1D4763">consume</text>
  <!-- processor -> cognito -->
  <path d="M681,202 L681,230" fill="none" stroke="#1D4763" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="700" y="220" text-anchor="middle" font-size="10.5" fill="#1D4763">token</text>
  <!-- processor -> agent -->
  <path d="M756,162 L886,166" fill="none" stroke="#1D4763" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="822" y="150" text-anchor="middle" font-size="10.5" fill="#1D4763">HTTPS + JWT</text>
  <!-- processor -> apollo (config) -->
  <path d="M754,196 L886,356" fill="none" stroke="#8C4FFF" stroke-width="1.5" marker-end="url(#arrowP)"/>
  <text x="858" y="284" text-anchor="middle" font-size="10.5" fill="#8C4FFF">config (GraphQL)</text>
  <!-- ecs <-> rds -->
  <path d="M416,380 L428,380" fill="none" stroke="#1D4763" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="423" y="424" text-anchor="middle" font-size="10" fill="#5A6C86">SQL</text>
  <!-- ecs -> apollo (federation) -->
  <path d="M578,388 L886,386" fill="none" stroke="#8C4FFF" stroke-width="1.5" stroke-dasharray="6 3" marker-end="url(#arrowP)"/>
  <text x="724" y="376" text-anchor="middle" font-size="10.5" fill="#8C4FFF">federation (PrivateLink)</text>
  <!-- agent -> alerts -->
  <path d="M888,206 L758,452" fill="none" stroke="#1D4763" stroke-width="1.5" stroke-dasharray="6 3" marker-end="url(#arrow)"/>
  <text x="852" y="330" text-anchor="middle" font-size="10.5" fill="#1D4763">notify (HMAC)</text>
  <!-- processor reply -> chat -->
  <path d="M620,202 L592,202 L592,568 L150,568 L150,298" fill="none" stroke="#248814" stroke-width="1.6" stroke-dasharray="6 3" marker-end="url(#arrowG)"/>
  <text x="360" y="562" text-anchor="middle" font-size="10.5" fill="#248814">post reply (bot token)</text>
  <!-- alerts reply -> chat -->
  <path d="M606,495 L120,495 L120,298" fill="none" stroke="#248814" stroke-width="1.5" stroke-dasharray="6 3" marker-end="url(#arrowG)"/>
  <text x="300" y="488" text-anchor="middle" font-size="10.5" fill="#248814">alert posted to chat</text>

  <!-- legend -->
  <text x="24" y="600" font-size="10.5" fill="#5A6C86">Solid = request · Dashed green = reply to chat · Dashed purple = federated GraphQL · Install λ (onboarding) omitted for clarity</text>
</svg>
